services:
  db:
    image: postgres:15
    container_name: odoo_erp_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_secret_2026
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  odoo:
    image: odoo:17.0
    container_name: odoo_erp_app
    depends_on:
      - db
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_secret_2026
    volumes:
      - odoo_web_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./custom_addons:/mnt/extra-addons
    ports:
      - "8069:8069"
    restart: unless-stopped

volumes:
  odoo_db_data:
  odoo_web_data:
