# Nginx reverse proxy pour Odoo - Production Azure
# Remplacer VOTRE_DOMAINE.com par votre domaine (ou IP Azure)

upstream odoo {
    server odoo:8069;
}

upstream odoo-chat {
    server odoo:8072;
}

# Redirection HTTP → HTTPS (décommenter quand SSL est configuré)
# server {
#     listen 80;
#     server_name VOTRE_DOMAINE.com;
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# Serveur principal
server {
    listen 80;
    # listen 443 ssl;  # Décommenter quand SSL est configuré
    server_name _;

    # SSL (décommenter après certbot)
    # ssl_certificate /etc/letsencrypt/live/VOTRE_DOMAINE.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.com/privkey.pem;

    # Logs
    access_log /var/log/nginx/odoo.access.log;
    error_log /var/log/nginx/odoo.error.log;

    # Taille max upload (rapports, pièces jointes)
    client_max_body_size 100M;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_read_timeout 720s;

    # Gzip compression
    gzip on;
    gzip_types text/css text/plain text/xml application/json application/javascript;
    gzip_min_length 1000;

    # Odoo web
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Odoo longpolling (chat, notifications temps réel)
    location /longpolling {
        proxy_pass http://odoo-chat;
    }

    # Cache des fichiers statiques
    location ~* /web/static/ {
        proxy_pass http://odoo;
        proxy_cache_valid 200 90m;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
