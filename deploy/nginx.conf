# Nginx reverse proxy pour Odoo - Production Azure
# Domaine: erp-btp-maroc.swedencentral.cloudapp.azure.com

upstream odoo {
    server odoo:8069;
}

upstream odoo-chat {
    server odoo:8072;
}

# --- HTTP: Certbot challenge + Redirect HTTPS ---
server {
    listen 80;
    server_name erp-btp-maroc.swedencentral.cloudapp.azure.com 51.107.183.143 _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: Odoo principal ---
server {
    listen 443 ssl;
    server_name erp-btp-maroc.swedencentral.cloudapp.azure.com 51.107.183.143 _;

    # SSL - Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/erp-btp-maroc.swedencentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp-btp-maroc.swedencentral.cloudapp.azure.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/odoo.access.log;
    error_log /var/log/nginx/odoo.error.log;

    # Taille max upload (rapports, pièces jointes)
    client_max_body_size 100M;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_read_timeout 720s;

    # Odoo websocket (notifications temps réel)
    location /websocket {
        proxy_pass http://odoo-chat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Odoo web
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Cache des fichiers statiques
    location ~* /web/static/ {
        proxy_pass http://odoo;
        proxy_cache_valid 200 60m;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
